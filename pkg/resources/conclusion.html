<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #f5f5f7; --card: #e8e8ed; --text: #1d1d1f;
    --sub: #6e6e73; --code-bg: #dcdce0; --green: #1a8f3c;
    --cmd-bg: #1d1d1f; --cmd-text: #30d158;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e; --card: #2c2c2e; --text: #f2f2f7;
      --sub: #aeaeb2; --code-bg: #3a3a3c; --green: #34c759;
      --cmd-bg: #0a0a0a; --cmd-text: #30d158;
    }
  }
  html, body { background: var(--bg); color: var(--text); margin: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; line-height: 1.6; padding: 20px; }
  h2 { font-size: 22px; font-weight: 600; color: var(--green); margin-bottom: 8px; }
  .subtitle { color: var(--sub); font-size: 14px; margin-bottom: 24px; }
  .section { background: var(--card); border-radius: 12px; padding: 16px 20px; margin-bottom: 16px; }
  .section h3 { font-size: 14px; font-weight: 600; margin: 0 0 8px 0; }
  code { background: var(--code-bg); color: var(--text); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  .cmd { background: var(--cmd-bg); color: var(--cmd-text); padding: 12px 16px; border-radius: 8px; font-family: "SF Mono", monospace; font-size: 13px; margin: 8px 0; }
</style>
</head>
<body>
  <h2>설치 완료!</h2>
  <div class="subtitle">Claw Web이 성공적으로 설치되었습니다.</div>

  <div class="section">
    <h3>지금 바로 시작</h3>
    <div class="cmd">open http://localhost:3838</div>
    <p style="font-size:13px; color:var(--sub);">서버가 자동으로 시작됩니다. 브라우저에서 위 주소로 접속하세요.</p>
  </div>

  <div class="section">
    <h3>초기 설정</h3>
    <ol style="font-size:13px;">
      <li><b>Settings</b> &rarr; AI Backends에서 Anthropic API 키 입력</li>
      <li><b>Agents</b> 탭에서 에이전트 추가</li>
      <li><b>Chat</b> 탭에서 대화 시작!</li>
    </ol>
  </div>

  <div class="section">
    <h3>유용한 명령어</h3>
    <p style="font-size:13px;">
      서버 로그: <code>tail -f /tmp/claw-web.log</code><br>
      Bearer 토큰: <code>cat ~/.claw-web/.bearer-token</code>
    </p>
  </div>
</body>
</html>
